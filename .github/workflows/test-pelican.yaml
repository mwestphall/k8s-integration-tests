name: Pelican Tests
on:
  workflow_call:
  workflow_dispatch:
jobs:
  generate-pelican-matrix:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'
    - name: Generate version matrix
      id: matrix
      run: echo "matrix=$(go run ./scripts/cmd/pelicanVersionMatrix)" >> $GITHUB_OUTPUT
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-pelican:
    name: Run Pelican tests
    needs: generate-pelican-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-pelican-matrix.outputs.matrix) }}
    uses: ./.github/workflows/test-harness.yaml
    with:
      testName: TestPelican
      testEnv: |
        PELICAN_ClientTag: v7.26.0-rc.0
        PELICAN_CacheTag: ${{ matrix.cacheVersion }}
        PELICAN_OriginTag: ${{ matrix.originVersion }}
        PELICAN_RegistryTag: ${{ matrix.registryVersion }}
        PELICAN_DirectorTag: ${{ matrix.directorVersion }}
      setupScript: | 
        VERSION="${{ matrix.clientVersion }}"
        VERSION="${VERSION#v}"
        DEB_VERSION=pelican_$(echo "$VERSION" | sed 's/-rc/.rc/')-1_amd64.deb
        wget -O pelican.deb "https://dl.pelicanplatform.org/${VERSION}/${DEB_VERSION}"
        sudo dpkg -i pelican.deb
