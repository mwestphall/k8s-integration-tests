name: OSPool EP Tests
on:
  workflow_call:
  workflow_dispatch:
jobs:
  test-ospool-ep:
    strategy:
      fail-fast: false
      matrix:
        cvmfsType: ['cvmfsexec', 'cvmfs-bind']
        ospoolEPVersion: ['25-release', '25-testing']
        include:
          - ospoolEPVersion: 25-release
            cmVersion: 25.0-el9
          - ospoolEPVersion: 25-testing
            cmVersion: 25.x-el9
    runs-on: ubuntu-22.04
    name: Run OSPool EP test
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup environment
      uses: ./.github/actions/setup
    - name: 'Test OSPool EP with ${{ matrix.cvmfsType }}, ${{ matrix.ospoolEPVersion }}, ${{ matrix.cmVersion }}'
      env:
        OSPOOL_EP_OSPoolEPTag: ${{ matrix.ospoolEPVersion }}
        OSPOOL_EP_CMTag: ${{ matrix.cmVersion }}
        OSPOOL_EP_CvmfsType: ${{ matrix.cvmfsType }}
      run: go test ./test -v -count 1 -run TestOSPoolEP -timeout 15m
    # Upload artifacts after the fact, named such that they can be correlated to the test run using the hash
    - id: make-artifact-hash
      if: always()
      uses: ./.github/actions/make-artifact-hash
    - name: Upload Test Logs for ${{ steps.make-artifact-hash.outputs.HASH }}
      if: always()
      uses: ./.github/actions/upload-artifacts-by-hash
      with:
        prefix: ospool-ep
        hash: ${{ steps.make-artifact-hash.outputs.HASH }}
