name: Run K8s Integration Tests
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # runs every day at midnight UTC
jobs:
  ospool-ep:
    uses: ./.github/workflows/test-ospool-ep.yaml

  pelican:
    uses: ./.github/workflows/test-pelican.yaml
    secrets: inherit

  notify:
    needs: [ospool-ep, pelican]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send email summary
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.EMAIL_WEBHOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"runID\": ${{ github.run_id }}}" \
            "http://${{ vars.RESULTS_DOMAIN }}/webhook/email-summary"
